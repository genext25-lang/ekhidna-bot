<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ехидна Наклз — Мафиози</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(30, 30, 35, 0.95);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(220, 60, 60, 0.3);
            text-align: center;
        }

        .hero-icon { font-size: 80px; margin-bottom: 8px; }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #e0e0e0, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub { color: #aaa; font-size: 14px; margin: 8px 0 28px 0; }

        .choice-buttons {
            display: flex;
            justify-content: space-around;
            gap: 16px;
            margin: 20px 0;
        }
        .choice-btn {
            background: #222;
            border: 2px solid #444;
            border-radius: 60px;
            padding: 12px 0;
            width: 100px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #eee;
        }
        .choice-btn:active { transform: scale(0.95); background: #2c2c2c; border-color: #ff5555; }
        .rock { border-left-color: #aa6f20; }
        .paper { border-left-color: #4a90e2; }
        .scissors { border-left-color: #e24a4a; }

        .status {
            background: #111;
            border-radius: 32px;
            padding: 14px;
            margin: 15px 0;
            font-size: 14px;
            color: #ccc;
        }

        .footer-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .small-btn {
            background: #1f1f2b;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: #ddd;
            cursor: pointer;
        }
        .small-btn:active { background: #333; color: #fff; }
        .info-text { margin-top: 24px; font-size: 11px; color: #5a5a6e; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hero-icon">🦔</div>
    <h1>ЕХИДНА НАКЛЗ</h1>
    <div class="sub">дуэль: камень / ножницы / бумага</div>

    <div id="statusMessage" class="status">👋 Нажмите на кнопку выбора жеста</div>

    <div class="choice-buttons">
        <button class="choice-btn rock" data-choice="rock">🪨 КАМЕНЬ</button>
        <button class="choice-btn paper" data-choice="paper">📄 БУМАГА</button>
        <button class="choice-btn scissors" data-choice="scissors">✂️ НОЖНИЦЫ</button>
    </div>

    <div class="footer-buttons">
        <div class="small-btn" id="profileBtn">📜 МОЙ ПРОФИЛЬ</div>
        <div class="small-btn" id="roomsBtn">🏟️ КОМНАТЫ</div>
    </div>
    <div class="info-text">💎 Сражения на TON • Рейтинговые бои • NFT-награды</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const statusDiv = document.getElementById('statusMessage');

    document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const choice = btn.getAttribute('data-choice');
            tg.sendData(choice);
            statusDiv.innerHTML = `✅ Ваш выбор: ${choice}. Ожидаем ответа бота...`;
            tg.showPopup({
                title: 'Выбор сделан',
                message: `Вы выбрали ${choice}. Результат придёт в чат с ботом.`,
                buttons: [{type: 'ok'}]
            });
        });
    });

    document.getElementById('profileBtn').addEventListener('click', () => {
        tg.openTelegramLink('https://t.me/EkhidnaNaklzBot');
        tg.showPopup({ title: '📜 Профиль', message: 'Переход в чат. Напишите /profile', buttons: [{type: 'ok'}] });
    });

    document.getElementById('roomsBtn').addEventListener('click', () => {
        tg.showPopup({ title: '🏟️ КОМНАТЫ', message: 'Список комнат и ставок появится позже', buttons: [{type: 'ok'}] });
    });

    tg.ready();
</script>
</body>
</html>
